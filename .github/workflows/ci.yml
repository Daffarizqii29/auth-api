name: Continuous Integration

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: daffa217
          POSTGRES_DB: forumapi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d forumapi_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      HOST: localhost
      PORT: 5000
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: daffa217
      PGDATABASE: forumapi_test
      ACCESS_TOKEN_KEY: dummy_access_token_key_for_ci
      REFRESH_TOKEN_KEY: dummy_refresh_token_key_for_ci
      ACCESS_TOKEN_AGE: 3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run database migration
        run: npm run migrate:test up

      - name: Run automated tests
        run: npm test